name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r tools/requirements.txt

      - name: Byte-compile all modules
        run: python -m py_compile main.py data_generator.py vnf_model.py slice_model.py resource_allocation.py tools/*.py

      - name: Generate synthetic dataset
        run: python tools/generate_synthetic_dataset.py

      - name: Smoke test (end-to-end)
        env:
          SMOKE_EPOCHS: "200"
        run: python tools/smoke_test.py

      - name: MoQ uplink test (synthetic traffic model)
        run: python tools/moq_uplink_test.py
